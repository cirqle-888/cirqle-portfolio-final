<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Resource Hints -->
    <link rel="preconnect" href="https://cdn.contentful.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.contentful.com" />

    <!-- Google Fonts preconnect (avoids render-blocking @import in CSS) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" /></noscript>

    <!-- Title -->

    <title>Creative Design Agency in Kerala | Graphic Design, Video &amp; Social Media | Cirqle</title>

    <!-- SEO Description -->

    <meta
      name="description"
      content="Cirqle is a Kerala-based creative design agency offering graphic design, video production, social media content, Meta Ads, and brand identity services. Premium quality, fast delivery."
    />

    <!-- Favicon -->

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Open Graph (for social media preview) -->

    <meta property="og:title" content="Creative Design Agency in Kerala | Graphic Design, Video &amp; Social Media | Cirqle" />
    <meta property="og:description" content="Cirqle is a Kerala-based creative design agency offering graphic design, video production, social media content, Meta Ads, and brand identity services." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://cirqle.work/og-image.png" />
    <meta name="robots" content="index, follow" />

    <!-- Theme Color -->

    <meta name="theme-color" content="#7C5CFF" />

    <!-- LocalBusiness Structured Data -->

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Cirqle",
      "url": "https://cirqle.work",
      "logo": "https://cirqle.work/og-image.png",
      "image": "https://cirqle.work/og-image.png",
      "description": "Cirqle is a Kerala-based creative design agency offering graphic design, video production, social media content, Meta Ads, and brand identity services.",
      "address": {
        "@type": "PostalAddress",
        "addressRegion": "Kerala",
        "addressCountry": "IN"
      },
      "areaServed": {
        "@type": "State",
        "name": "Kerala"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Creative Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Graphic Design"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Video Production"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Social Media Management"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Meta Ads"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Brand Identity"
            }
          }
        ]
      },
      "sameAs": [
        "https://cirqle.work"
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <!-- React Entry -->

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
